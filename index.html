    <!-- Hydrate absolute URLs at runtime (fallback if canonical domain isn't set yet) -->
    <script>
      (function () {
        try {
          var origin = window.location.origin;
          var abs = function (path) {
            if (!path) return path;
            return path.indexOf("http") === 0 ? path : origin + (path.charAt(0) === "/" ? path : "/" + path);
          };
          var isPlaceholder = function (s) {
            return /https:\/\/jorgedelgadillo.com\//.test(s || "") || !/^https?:\/\//.test(s || "");
          };

          // Canonical
          var link = document.querySelector('link[rel="canonical"]');
          if (link && isPlaceholder(link.getAttribute("href"))) link.href = origin + "/";

          // og:url
          var ogUrl = document.querySelector('meta[property="og:url"]');
          if (ogUrl && isPlaceholder(ogUrl.getAttribute("content")))
            ogUrl.setAttribute("content", origin + "/");

          // og:image and twitter:image -> ensure absolute
          ['meta[property="og:image"]', 'meta[name="twitter:image"]'].forEach(function (sel) {
            var m = document.querySelector(sel);
            if (m && !/^https?:\/\//.test(m.content)) m.setAttribute("content", abs(m.content));
          });

          // JSON-LD: handle @graph or top-level node
          var ld = document.querySelector('script[type="application/ld+json"]');
          if (ld) {
            var data = JSON.parse(ld.textContent || "{}");
            var nodes = data["@graph"] ? data["@graph"] : [data];
            nodes.forEach(function (n) {
              if (!n || !n["@type"]) return;
              var t = n["@type"];
              if (t === "Person" || t === "WebSite" || t === "ProfilePage" || t === "WebPage") {
                if (isPlaceholder(n.url)) n.url = origin + "/";
              }
              if (t === "Person" && isPlaceholder(n.image)) n.image = origin + "/avatar.jpg";
            });
            ld.textContent = JSON.stringify(data);
          }
        } catch (e) {
          /* no-op */
        }
      })();
    </script>
